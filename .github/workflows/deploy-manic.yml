name: Build & Deploy manic

# Manual trigger only. Pick the target arch/host from the dropdown (default AARCH).
# Builds the manic binary for that architecture and installs it to /usr/local/bin
# on the chosen EC2 box over SSH.
#
# Required repo config (Settings → Secrets and variables → Actions):
#   Variables:  SSH_HOST_A1_AARCH = 13.223.205.115
#               SSH_HOST_A2_AMD   = 54.224.149.71
#               SSH_USER          = ubuntu   (optional; defaults to "ubuntu")
#   Secrets:    SSH_PRIVATE_KEY   = private key authorized on both boxes

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Where to deploy (architecture / host)"
        type: choice
        required: true
        default: aarch
        options:
          - aarch   # ARM64 / Graviton  →  SSH_HOST_A1_AARCH
          - amd     # x86_64 / Intel-AMD →  SSH_HOST_A2_AMD

permissions:
  contents: read

concurrency:
  group: deploy-manic-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  build-deploy:
    # Build natively on the matching arch — arm64 uses GitHub's arm64 hosted
    # runner (no QEMU emulation, so the Rust build is fast).
    runs-on: ${{ inputs.target == 'amd' && 'ubuntu-latest' || 'ubuntu-24.04-arm' }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve target
        id: t
        run: |
          if [ "${{ inputs.target }}" = "amd" ]; then
            echo "arch=amd64"                        >> "$GITHUB_OUTPUT"
            echo "host=${{ vars.SSH_HOST_A2_AMD }}"  >> "$GITHUB_OUTPUT"
          else
            echo "arch=arm64"                          >> "$GITHUB_OUTPUT"
            echo "host=${{ vars.SSH_HOST_A1_AARCH }}"  >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build manic (${{ steps.t.outputs.arch }})
        run: bash scripts/build-linux.sh ${{ steps.t.outputs.arch }}

      - name: Deploy to ${{ steps.t.outputs.host }}
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_USER: ${{ vars.SSH_USER || 'ubuntu' }}
          HOST: ${{ steps.t.outputs.host }}
          ARCH: ${{ steps.t.outputs.arch }}
        run: |
          set -euo pipefail
          if [ -z "${HOST:-}" ]; then
            echo "::error::No host resolved — set the SSH_HOST_A1_AARCH / SSH_HOST_A2_AMD repo variables."
            exit 1
          fi
          BIN="dist/manic-linux-${ARCH}"
          test -f "$BIN" || { echo "::error::build output $BIN missing"; exit 1; }

          install -d -m 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          SSHOPTS="-i $HOME/.ssh/id_deploy -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20"
          echo ">> copying $BIN to $SSH_USER@$HOST"
          scp $SSHOPTS "$BIN" "$SSH_USER@$HOST:/tmp/manic.new"
          echo ">> installing to /usr/local/bin/manic (sudo)"
          ssh $SSHOPTS "$SSH_USER@$HOST" \
            'sudo install -m 0755 /tmp/manic.new /usr/local/bin/manic && rm -f /tmp/manic.new && echo installed: && file /usr/local/bin/manic'

      - name: Summary
        if: always()
        run: |
          {
            echo "### manic deploy"
            echo ""
            echo "| field | value |"
            echo "|---|---|"
            echo "| target | \`${{ inputs.target }}\` |"
            echo "| arch | \`${{ steps.t.outputs.arch }}\` |"
            echo "| host | \`${{ steps.t.outputs.host }}\` |"
            echo "| path | \`/usr/local/bin/manic\` |"
            echo "| runner | \`${{ runner.os }}/${{ runner.arch }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
